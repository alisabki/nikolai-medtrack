<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nikolai Hub | Tactical Med-Track</title>
    
    <!-- Meta Tags for WhatsApp Preview -->
    <meta property="og:title" content="Nikolai Med-Track 🦷⚡">
    <meta property="og:description" content="Status Rawatan & Jadual Ubat Nikolai.">
    <meta property="og:type" content="website">

    <!-- Frameworks (CDN) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0a0a0a; 
            color: white;
            overflow-x: hidden;
        }
        .shiny-purple { 
            box-shadow: 0 0 20px rgba(147, 51, 234, 0.6); 
            background: linear-gradient(135deg, #9333ea 0%, #4f46e5 100%);
        }
        .shiny-green { 
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.5); 
            background: #10b981;
        }
        .glass {
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        input:focus { outline: none; border-color: #9333ea; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Inline Icons for better reliability
        const IconZap = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>;
        const IconPill = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"></path><path d="m8.5 8.5 7 7"></path></svg>;
        const IconClock = () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
        const IconLock = () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>;

        const App = () => {
            const [activeDay, setActiveDay] = useState(1);
            const [completedDoses, setCompletedDoses] = useState({});
            const [isLocked, setIsLocked] = useState(true);
            const [pin, setPin] = useState('');
            const [msg, setMsg] = useState('');

            const ADMIN_PIN = "nikolai123";

            const medicationData = [
                { id: 'amox', name: 'Amoxicillin', dose: '1 Biji', type: 'Antibiotik', color: 'bg-indigo-600' },
                { id: 'metro', name: 'Metronidazole', dose: '2 Biji', type: 'Antibiotik', color: 'bg-purple-600' },
                { id: 'diclo', name: 'Diclofenac', dose: '1 Biji', type: 'Tahan Sakit', color: 'bg-emerald-600' }
            ];

            useEffect(() => {
                const saved = localStorage.getItem('nikolai_med_v7_final');
                if (saved) setCompletedDoses(JSON.parse(saved));
            }, []);

            useEffect(() => {
                localStorage.setItem('nikolai_med_v7_final', JSON.stringify(completedDoses));
            }, [completedDoses]);

            const handleUnlock = (e) => {
                e.preventDefault();
                if (pin === ADMIN_PIN) {
                    setIsLocked(false);
                    setMsg('');
                } else {
                    setMsg('PIN SALAH!');
                    setPin('');
                }
            };

            const toggle = (day, medId, slotId) => {
                if (isLocked) { setMsg('UNLOCK DULU!'); return; }
                const key = `${day}-${medId}-${slotId}`;
                setCompletedDoses(prev => {
                    const next = { ...prev };
                    if (next[key]) delete next[key];
                    else next[key] = new Date().toISOString();
                    return next;
                });
            };

            const getNextTime = (medId) => {
                const times = Object.keys(completedDoses)
                    .filter(k => k.includes(`-${medId}-`))
                    .map(k => new Date(completedDoses[k]).getTime());
                if (times.length === 0) return "--:--";
                const last = Math.max(...times);
                return new Date(last + 8 * 3600000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            };

            const getDayCount = (day) => Object.keys(completedDoses).filter(k => k.startsWith(`${day}-`)).length;

            return (
                <div className="max-w-md mx-auto p-4 min-h-screen pb-20">
                    {/* Header */}
                    <header className="flex justify-between items-center mb-6">
                        <div className="flex items-center gap-2">
                            <div className="bg-purple-600 p-2 rounded-xl shiny-purple"><IconZap /></div>
                            <h1 className="text-xl font-black uppercase italic tracking-tighter">Nikolai Hub</h1>
                        </div>
                        <div className="flex gap-2 items-center">
                            {isLocked ? (
                                <form onSubmit={handleUnlock} className="bg-[#161616] p-1 rounded-lg border border-white/10 flex">
                                    <input type="password" value={pin} onChange={e=>setPin(e.target.value)} placeholder="PIN" className="bg-transparent text-[10px] w-10 px-1 font-bold text-center" />
                                    <button className="bg-purple-600 p-1 rounded"><IconLock /></button>
                                </form>
                            ) : (
                                <button onClick={()=>setIsLocked(true)} className="bg-emerald-600 px-3 py-1.5 rounded-lg text-[10px] font-black uppercase shadow-lg shadow-emerald-900/20">Unlocked</button>
                            )}
                        </div>
                    </header>

                    {msg && <div className="bg-red-900/30 border border-red-500 text-red-500 text-[10px] p-2 rounded-lg mb-4 font-bold text-center">{msg}</div>}

                    {/* Procedure Info */}
                    <div className="bg-gradient-to-br from-indigo-900 to-purple-900 p-5 rounded-3xl border border-white/10 mb-6 shadow-2xl">
                        <p className="text-[10px] font-black text-indigo-300 uppercase tracking-widest mb-1">Temujanji Seterusnya</p>
                        <p className="text-sm font-black">29 Mac @ Klinik Kota Bharu</p>
                        <div className="mt-3 pt-3 border-t border-white/10 text-[10px] font-bold italic text-white/70 uppercase">Minor Oral Surgery (Full Procedure)</div>
                    </div>

                    {/* Day Selector */}
                    <div className="flex bg-[#161616] p-1 rounded-xl mb-6 border border-white/5">
                        {[1, 2, 3, 4, 5].map(d => (
                            <button key={d} onClick={()=>setActiveDay(d)} className={`flex-1 py-3 text-xs font-black rounded-lg transition-all ${activeDay===d ? 'bg-purple-600 text-white shadow-lg' : 'text-gray-500'}`}>
                                D{d} <span className="block text-[8px] opacity-40">{getDayCount(d)}/9</span>
                            </button>
                        ))}
                    </div>

                    {/* Slots */}
                    {['Sahur', 'Iftar', 'Malam'].map(slot => (
                        <div key={slot} className="mb-4 bg-[#161616] rounded-3xl border border-white/5 overflow-hidden shadow-xl">
                            <div className="px-5 py-2 bg-white/5 flex justify-between items-center text-[10px] font-black uppercase text-gray-500">
                                <span>{slot} Schedule</span>
                                <IconClock />
                            </div>
                            <div className="p-2 space-y-2">
                                {medicationData.map(med => {
                                    const key = `${activeDay}-${med.id}-${slot.toLowerCase()}`;
                                    const takenAt = completedDoses[key];
                                    return (
                                        <button key={med.id} onClick={()=>toggle(activeDay, med.id, slot.toLowerCase())} className={`w-full flex items-center justify-between p-3 rounded-2xl border transition-all ${takenAt ? 'bg-emerald-900/10 border-emerald-500/30' : 'bg-[#1f1f1f] border-white/5'}`}>
                                            <div className="flex items-center gap-3 text-left">
                                                <div className={`p-2 rounded-xl ${takenAt ? 'shiny-green' : med.color}`}><IconPill /></div>
                                                <div>
                                                    <p className={`text-xs font-bold ${takenAt ? 'text-emerald-400 line-through opacity-40' : 'text-white'}`}>{med.name}</p>
                                                    <p className="text-[8px] text-gray-500 font-bold uppercase">{med.dose} • {med.type}</p>
                                                </div>
                                            </div>
                                            {!takenAt && <div className="text-right">
                                                <p className="text-[7px] text-gray-600 font-black uppercase tracking-tighter">Cadangan Seterusnya</p>
                                                <p className="text-[10px] font-mono text-purple-400 font-bold">{getNextTime(med.id)}</p>
                                            </div>}
                                            {takenAt && <div className="text-[8px] font-bold text-emerald-500">SETEL</div>}
                                        </button>
                                    );
                                })}
                            </div>
                        </div>
                    ))}

                    {/* Tactical Tips */}
                    <div className="bg-[#161616] p-5 rounded-3xl border border-white/5 mt-6 shadow-2xl">
                        <h3 className="text-[10px] font-black text-purple-400 uppercase tracking-widest mb-4 border-b border-white/5 pb-2">Tactical Protocols</h3>
                        <div className="space-y-3 text-[10px] font-bold text-gray-400 uppercase leading-tight">
                            <div className="flex gap-3"><span className="text-purple-600">01</span><span>Antibiotik wajib habiskan (5 hari).</span></div>
                            <div className="flex gap-3"><span className="text-purple-600">02</span><span>Diclofenac wajib alas perut (nasi/megi).</span></div>
                            <div className="flex gap-3"><span className="text-purple-600">03</span><span>Tidur menyandar/bantal tinggi malam ni.</span></div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
