<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nikolai Hub | Tactical Med-Track V11</title>
    
    <!-- Meta Tags for Social Preview -->
    <meta property="og:title" content="Nikolai Med-Track 🦷⚡">
    <meta property="og:description" content="Status Rawatan & Jadual Ubat Nikolai. V11 Tactical Share Edition.">
    <meta property="og:type" content="website">

    <!-- Frameworks (CDN) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0a0a0a; 
            color: white;
            overflow-x: hidden;
        }
        .shiny-purple { 
            box-shadow: 0 0 20px rgba(147, 51, 234, 0.6); 
            background: linear-gradient(135deg, #9333ea 0%, #4f46e5 100%);
        }
        .shiny-green { 
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.6); 
            background: #10b981;
        }
        .glass {
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .custom-time-input::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="root">
        <!-- Loading state for slow connections -->
        <div class="flex items-center justify-center min-h-screen bg-[#0a0a0a]">
            <div className="text-purple-500 font-black animate-pulse uppercase tracking-[0.3em] text-xs">Initializing Nikolai System...</div>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const IconZap = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>;
        const IconPill = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"></path><path d="m8.5 8.5 7 7"></path></svg>;
        const IconMapPin = () => <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>;
        const IconShare = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>;

        const App = () => {
            const [activeDay, setActiveDay] = useState(1);
            const [completedDoses, setCompletedDoses] = useState({});
            const [isLocked, setIsLocked] = useState(true);
            const [pin, setPin] = useState('');
            const [error, setError] = useState('');
            const [showModal, setShowModal] = useState(false);
            const [copied, setCopied] = useState(false);

            const ADMIN_PIN = "nikolai123";

            const medicationData = [
                { id: 'amox', name: 'Amoxicillin', dose: '1 Biji', type: 'Antibiotik', color: 'bg-indigo-600 shadow-[0_0_10px_rgba(79,70,229,0.5)]' },
                { id: 'metro', name: 'Metronidazole', dose: '2 Biji', type: 'Antibiotik', color: 'bg-purple-600 shadow-[0_0_10px_rgba(147,51,234,0.5)]' },
                { id: 'diclo', name: 'Diclofenac', dose: '1 Biji', type: 'Tahan Sakit', color: 'bg-emerald-600 shadow-[0_0_10px_rgba(16,185,129,0.5)]' }
            ];

            const timeSlots = [
                { id: 'sahur', label: 'Sahur', planned: '05:00 AM' },
                { id: 'buka', label: 'Iftar', planned: '07:20 PM' },
                { id: 'malam', label: 'Malam', planned: '11:30 PM' }
            ];

            useEffect(() => {
                const saved = localStorage.getItem('nikolai_med_v11_logs');
                if (saved) setCompletedDoses(JSON.parse(saved));
            }, []);

            useEffect(() => {
                localStorage.setItem('nikolai_med_v11_logs', JSON.stringify(completedDoses));
            }, [completedDoses]);

            const handleUnlock = (e) => {
                e.preventDefault();
                if (pin === ADMIN_PIN) { 
                    setIsLocked(false); 
                    setError(''); 
                } else { 
                    setError('PIN SALAH!'); 
                    setPin(''); 
                }
            };

            const toggleDose = (day, medId, slotId) => {
                if (isLocked) { 
                    setError('Sila Unlock Dahulu!'); 
                    return; 
                }
                const key = `${day}-${medId}-${slotId}`;
                setCompletedDoses(prev => {
                    const next = { ...prev };
                    if (next[key]) {
                        delete next[key];
                    } else {
                        next[key] = new Date().toISOString();
                    }
                    return next;
                });
            };

            const manualTimeChange = (key, newTimeValue) => {
                if (isLocked) return;
                const [hours, minutes] = newTimeValue.split(':');
                const date = new Date(completedDoses[key]);
                date.setHours(parseInt(hours), parseInt(minutes));
                setCompletedDoses(prev => ({ ...prev, [key]: date.toISOString() }));
            };

            const getNextSuggestion = (medId) => {
                const times = Object.keys(completedDoses)
                    .filter(k => k.includes(`-${medId}-`))
                    .map(k => new Date(completedDoses[k]).getTime());
                if (times.length === 0) return "Standby Sahur";
                const last = Math.max(...times);
                return new Date(last + 8 * 3600000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            };

            const getProgress = () => {
                const total = 5 * 3 * 3;
                const done = Object.values(completedDoses).filter(Boolean).length;
                return Math.round((done / total) * 100);
            };

            const getDayCount = (day) => {
                return Object.keys(completedDoses).filter(k => k.startsWith(`${day}-`)).length;
            };

            const copyStatusText = () => {
                const text = `Update Kesihatan Nikolai:\n📊 Progress: ${getProgress()}%\n🦷 Diagnosis: Impacted Wisdom Tooth\n📅 Temujanji: 29 Mac 2026\n#NikolaiMedTrack`;
                navigator.clipboard.writeText(text);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            return (
                <div className="max-w-md mx-auto p-4 min-h-screen pb-20 select-none">
                    {/* Header */}
                    <header className="flex justify-between items-center mb-6 text-left">
                        <div className="flex items-center gap-2">
                            <div className="bg-purple-600 p-2 rounded-xl shiny-purple"><IconZap /></div>
                            <h1 className="text-xl font-black uppercase italic tracking-tighter">Nikolai Hub</h1>
                        </div>
                        <div className="flex gap-2 items-center">
                            <button 
                                onClick={() => setShowModal(true)}
                                className="bg-[#161616] border border-white/10 px-3 py-1.5 rounded-xl text-[10px] font-black uppercase tracking-widest text-purple-400 hover:bg-white/5 transition-all flex items-center gap-2"
                            >
                                <IconShare /> SHARE
                            </button>
                            {isLocked ? (
                                <form onSubmit={handleUnlock} className="bg-[#161616] p-1 rounded-lg border border-white/10 flex">
                                    <input type="password" value={pin} onChange={e=>setPin(e.target.value)} placeholder="PIN" className="bg-transparent text-[10px] w-10 px-1 font-bold text-center" />
                                    <button type="submit" className="bg-purple-600 p-1 rounded">
                                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                                    </button>
                                </form>
                            ) : (
                                <button onClick={()=>setIsLocked(true)} className="bg-emerald-600 px-3 py-1.5 rounded-lg text-[10px] font-black uppercase shadow-lg shadow-emerald-900/20">Unlocked</button>
                            )}
                        </div>
                    </header>

                    {error && <div className="bg-red-900/30 border border-red-500 text-red-500 text-[10px] p-2 rounded-lg mb-4 font-bold text-center uppercase animate-pulse tracking-widest">{error}</div>}

                    {/* Appointment Card */}
                    <section className="bg-gradient-to-br from-indigo-700 to-purple-900 p-5 rounded-3xl border border-white/10 mb-6 shadow-2xl relative overflow-hidden text-left">
                        <div className="absolute top-0 right-0 p-8 bg-white/10 rounded-full -mr-10 -mt-10 blur-2xl"></div>
                        <p className="text-[10px] font-black text-indigo-200 uppercase tracking-widest mb-1 italic">Temujanji Seterusnya</p>
                        <p className="text-base font-black tracking-tight leading-tight">29 Mac 2026</p>
                        <div className="flex items-center gap-1 text-indigo-300 mt-1">
                            <IconMapPin />
                            <span className="text-[10px] font-bold uppercase tracking-tighter text-indigo-200">Klinik Pergigian Kota Bharu</span>
                        </div>
                        <div className="mt-4 pt-3 border-t border-white/10 text-[10px] font-bold text-white uppercase italic tracking-tighter">
                            Prosedur: Minor Oral Surgery (Full Procedure)
                        </div>
                    </section>

                    {/* Status Semasa Card */}
                    <div className="bg-[#161616] p-5 rounded-3xl border border-white/5 mb-6 shadow-2xl relative overflow-hidden text-left flex justify-between items-center">
                        <div>
                            <p className="text-[10px] font-black text-emerald-400 uppercase tracking-widest mb-1 font-black">Status Rawatan Gigi</p>
                            <p className="text-sm font-bold leading-tight">Impacted Wisdom Tooth</p>
                            <p className="text-[10px] text-gray-500 font-bold mt-1 uppercase italic">Fasa: Kawalan Jangkitan</p>
                        </div>
                        <div className="text-right">
                            <span className="text-3xl font-black text-purple-500 leading-none">{getProgress()}%</span>
                            <p className="text-[8px] font-black text-gray-600 uppercase tracking-widest">Load</p>
                        </div>
                    </div>

                    {/* Day Selector */}
                    <div className="flex bg-[#161616] p-1.5 rounded-2xl mb-6 border border-white/5 shadow-inner">
                        {[1, 2, 3, 4, 5].map(d => (
                            <button key={d} onClick={()=>setActiveDay(d)} className={`flex-1 py-3 text-xs font-black rounded-xl transition-all duration-300 ${activeDay===d ? 'bg-gradient-to-br from-purple-600 to-indigo-700 text-white shadow-lg scale-95' : 'text-gray-600'}`}>
                                D{d} <span className="block text-[8px] opacity-40 font-mono tracking-tighter">{getDayCount(d)}/9</span>
                            </button>
                        ))}
                    </div>

                    {/* Slots List */}
                    <div className="space-y-4">
                        {timeSlots.map(slot => (
                            <div key={slot.id} className="bg-[#161616] rounded-[2rem] border border-white/5 overflow-hidden shadow-xl">
                                <div className="px-6 py-2.5 bg-white/5 flex justify-between items-center text-[10px] font-black uppercase text-gray-400 border-b border-white/5">
                                    <span className="tracking-widest">{slot.label} Protocol</span>
                                    <span className="font-mono text-gray-700 italic tracking-tighter">Planned: {slot.planned}</span>
                                </div>
                                <div className="p-3 space-y-2.5">
                                    {medicationData.map(med => {
                                        const key = `${activeDay}-${med.id}-${slot.id}`;
                                        const timestamp = completedDoses[key];
                                        const isChecked = !!timestamp;

                                        return (
                                            <div key={med.id}>
                                                <div className={`w-full flex items-center justify-between p-4 rounded-2xl border transition-all duration-300 ${isChecked ? 'bg-emerald-900/10 border-emerald-500/30' : 'bg-[#1f1f1f] border-white/5 hover:border-purple-500/30'}`}>
                                                    <div className="flex items-center gap-4 text-left cursor-pointer" onClick={()=>toggleDose(activeDay, med.id, slot.id)}>
                                                        <div className={`p-2.5 rounded-xl transition-all ${isChecked ? 'shiny-green' : med.color} shadow-lg`}><IconPill /></div>
                                                        <div>
                                                            <p className={`text-sm font-bold tracking-tight ${isChecked ? 'text-emerald-400 line-through opacity-30 font-black' : 'text-white'}`}>{med.name}</p>
                                                            <p className="text-[9px] text-gray-600 font-black uppercase tracking-tighter">{med.dose} • {med.type}</p>
                                                        </div>
                                                    </div>
                                                    
                                                    <div className="text-right flex flex-col items-end">
                                                        {isChecked ? (
                                                            <div className="flex flex-col items-end gap-1">
                                                                <div className="text-emerald-500">
                                                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                                                                </div>
                                                                <div className="flex items-center gap-1.5 bg-emerald-500/10 px-2 py-1 rounded-md border border-emerald-500/20">
                                                                    <input 
                                                                        type="time" 
                                                                        disabled={isLocked}
                                                                        value={new Date(timestamp).toTimeString().slice(0,5)}
                                                                        onChange={(e) => manualTimeChange(key, e.target.value)}
                                                                        className="bg-transparent text-[10px] font-black text-emerald-400 focus:outline-none custom-time-input"
                                                                    />
                                                                </div>
                                                            </div>
                                                        ) : (
                                                            <div className="flex flex-col items-end opacity-40">
                                                                <div className="w-5 h-5 rounded-full border border-white/10 mb-1"></div>
                                                                <span className="text-[8px] font-black text-gray-700 uppercase tracking-tighter italic leading-none">Seterusnya:</span>
                                                                <span className="text-[10px] font-black text-purple-400 font-mono tracking-tighter">{getNextSuggestion(med.id)}</span>
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Tactical Tips & Peringatan */}
                    <section className="bg-gradient-to-br from-[#1a1a1a] to-[#0f0f0f] rounded-3xl border border-white/10 p-6 mt-8 shadow-2xl text-left">
                        <div className="flex items-center gap-2 border-b border-white/5 pb-3 mb-4">
                            <div className="w-2 h-2 rounded-full bg-purple-500 animate-pulse"></div>
                            <h3 className="text-[11px] font-black uppercase tracking-[0.2em] text-purple-300 italic">Tactical Protocols</h3>
                        </div>
                        <div className="space-y-4 text-[10px] font-bold text-gray-500 uppercase leading-tight tracking-tight">
                            <div className="flex gap-4">
                                <span className="text-purple-600 font-black">01</span>
                                <p><span className="text-white">Antibiotik:</span> Wajib habiskan 5 hari untuk elak kuman lali.</p>
                            </div>
                            <div className="flex gap-4">
                                <span className="text-purple-600 font-black">02</span>
                                <p><span className="text-white">Alas Perut:</span> Diclofenac sangat tajam. Wajib makan alas perut sebelum telan.</p>
                            </div>
                            <div className="flex gap-4">
                                <span className="text-purple-600 font-black">03</span>
                                <p><span className="text-white">Tidur:</span> Gunakan bantal tinggi (menyandar). Jangan baring rata.</p>
                            </div>
                        </div>
                    </section>

                    {/* Share Modal */}
                    {showModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/95 backdrop-blur-xl">
                            <div className="bg-[#121212] w-full max-w-sm rounded-[2.5rem] border border-white/10 overflow-hidden shadow-[0_0_50px_rgba(147,51,234,0.3)]">
                                <div className="p-8 text-center space-y-8 bg-gradient-to-b from-[#1a1a1a] to-[#0a0a0a]">
                                    <div className="flex justify-center">
                                        <div className="bg-purple-600 p-3 rounded-2xl shiny-purple">
                                            <IconZap />
                                        </div>
                                    </div>
                                    
                                    <div>
                                        <h3 className="text-2xl font-black italic tracking-tighter uppercase mb-1 leading-none text-white">Nikolai Medical</h3>
                                        <div className="inline-block px-4 py-1.5 bg-emerald-500/10 rounded-full border border-emerald-500/20">
                                            <span className="text-[10px] font-black text-emerald-500 uppercase tracking-widest">Infection Control Active</span>
                                        </div>
                                    </div>

                                    <div className="space-y-3 text-left bg-white/5 p-5 rounded-3xl border border-white/5">
                                        <div className="flex justify-between items-center mb-1">
                                            <span className="text-[10px] font-black text-gray-500 uppercase tracking-widest">Overall Progress</span>
                                            <span className="text-2xl font-black text-purple-500">{getProgress()}%</span>
                                        </div>
                                        <div className="w-full bg-white/10 h-2 rounded-full overflow-hidden">
                                            <div className="h-full bg-gradient-to-r from-purple-500 to-indigo-500" style={{ width: `${getProgress()}%` }}></div>
                                        </div>
                                        <p className="text-[10px] font-bold text-gray-400 mt-2 uppercase tracking-tighter italic leading-tight">
                                            Diagnosis: Impacted Wisdom Tooth<br/>
                                            Appt: 29 Mac 2026 @ KB
                                        </p>
                                    </div>

                                    <div className="grid grid-cols-2 gap-4 text-left">
                                        <div className="bg-indigo-600/10 p-4 rounded-2xl border border-indigo-500/20 text-indigo-400 font-black uppercase italic text-[11px] text-center tracking-widest">Stabilizing</div>
                                        <div className="bg-emerald-600/10 p-4 rounded-2xl border border-emerald-500/20 text-emerald-400 font-black uppercase italic text-[11px] text-center tracking-widest">Tracking</div>
                                    </div>

                                    <p className="text-[8px] text-gray-700 font-black uppercase tracking-[0.4em]">Nikolai Tactical System V11</p>
                                </div>

                                <div className="p-6 bg-[#1a1a1a] border-t border-white/5 space-y-3">
                                    <button 
                                        onClick={copyStatusText}
                                        className={`w-full py-4 rounded-2xl font-black text-xs tracking-widest transition-all ${copied ? 'bg-emerald-600 text-white shadow-[0_0_15px_rgba(16,185,129,0.4)]' : 'bg-white text-black'}`}
                                    >
                                        {copied ? 'BERJAYA DISALIN!' : 'SALIN TEKS STATUS'}
                                    </button>
                                    <button 
                                        onClick={() => setShowModal(false)}
                                        className="w-full py-4 rounded-2xl bg-white/5 text-gray-500 font-black text-xs uppercase tracking-widest transition-all hover:text-white"
                                    >
                                        TUTUP
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="mt-12 text-center opacity-20 pb-10 uppercase font-black text-[8px] tracking-[0.6em]">
                        System Restore Complete • Nikolai Personal
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
