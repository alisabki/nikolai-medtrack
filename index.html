<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nikolai Med-Track | Tactical Interface</title>
    
    <!-- Meta Tags for Social Preview -->
    <meta property="og:title" content="Nikolai Med-Track 🦷⚡">
    <meta property="og:description" content="Tactical Medical Interface - Status Rawatan & Jadual Ubat Nikolai.">
    <meta property="og:type" content="website">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0a0a0a; 
            color: white;
            -webkit-tap-highlight-color: transparent;
        }
        .shiny-purple { 
            box-shadow: 0 0 20px rgba(147, 51, 234, 0.6); 
            background: linear-gradient(135deg, #9333ea 0%, #4f46e5 100%);
        }
        .shiny-green { 
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.5); 
            background: #10b981;
        }
        .glass {
            background: rgba(26, 26, 26, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .bg-card { background-color: #161616; }
        .bg-slot { background-color: #1f1f1f; }
        
        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .animate-pulse-slow { animation: pulse-soft 3s infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Optimized SVG Icons
        const IconZap = ({ className }) => <svg className={className} width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>;
        const IconShare = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>;
        const IconPill = ({ className }) => <svg className={className} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"></path><path d="m8.5 8.5 7 7"></path></svg>;
        const IconCheck = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>;
        const IconActivity = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>;
        const IconMapPin = () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>;

        const App = () => {
            const [activeDay, setActiveDay] = useState(1);
            const [completedDoses, setCompletedDoses] = useState({});
            const [showModal, setShowModal] = useState(false);
            const [copied, setCopied] = useState(false);

            const diagnosis = {
                title: "Impacted Wisdom Tooth & Deep Caries",
                description: "Gigi bongsu menolak geraham (impak) + Gigi geraham berlubang dalam.",
                status: "Active Infection / Inflammation"
            };

            const appointment = {
                date: "29 Mac 2026",
                location: "Klinik Pergigian Kota Bharu",
                procedure: "Minor Oral Surgery (Full Procedure)"
            };

            const medicationData = [
                { id: 'amox', name: 'Amoxicillin', dose: '1 Biji', type: 'Antibiotik', colorClass: 'bg-indigo-600 shadow-[0_0_10px_rgba(79,70,229,0.5)]' },
                { id: 'metro', name: 'Metronidazole', dose: '2 Biji', type: 'Antibiotik', colorClass: 'bg-purple-600 shadow-[0_0_10px_rgba(147,51,234,0.5)]' },
                { id: 'diclo', name: 'Diclofenac', dose: '1 Biji', type: 'Tahan Sakit', colorClass: 'bg-emerald-600 shadow-[0_0_10px_rgba(16,185,129,0.5)]' }
            ];

            const timeSlots = [
                { id: 'sahur', label: 'Sahur', time: '05:00 AM' },
                { id: 'buka', label: 'Iftar', time: '07:20 PM' },
                { id: 'malam', label: 'Malam', time: '11:30 PM' }
            ];

            useEffect(() => {
                const saved = localStorage.getItem('nikolai_final_v5');
                if (saved) setCompletedDoses(JSON.parse(saved));
            }, []);

            useEffect(() => {
                localStorage.setItem('nikolai_final_v5', JSON.stringify(completedDoses));
            }, [completedDoses]);

            const toggleDose = (day, medId, slotId) => {
                const key = `${day}-${medId}-${slotId}`;
                setCompletedDoses(prev => ({ ...prev, [key]: !prev[key] }));
            };

            const getProgress = () => {
                const total = 5 * 3 * 3;
                const done = Object.values(completedDoses).filter(Boolean).length;
                return Math.round((done / total) * 100);
            };

            const getDayProgress = (day) => {
                const dayKeys = Object.keys(completedDoses).filter(k => k.startsWith(`${day}-`));
                return dayKeys.filter(k => completedDoses[k]).length;
            };

            const copyStatus = () => {
                const text = `Nikolai Med-Track Update:\n🦷 Diagnosis: ${diagnosis.title}\n📅 Temujanji: ${appointment.date}\n🏥 Lokasi: ${appointment.location}\n📊 Progress: ${getProgress()}%\n#NikolaiTacticalHealth`;
                navigator.clipboard.writeText(text);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-xl mx-auto pb-24">
                    {/* Top Header */}
                    <header className="flex items-center justify-between mb-6">
                        <div className="flex items-center gap-2">
                            <div className="bg-purple-600 p-1.5 rounded-lg shiny-purple">
                                <IconZap className="text-white" />
                            </div>
                            <h1 className="text-xl font-black uppercase italic tracking-tighter bg-gradient-to-r from-white to-gray-500 bg-clip-text text-transparent">
                                Nikolai Hub
                            </h1>
                        </div>
                        <button 
                            onClick={() => setShowModal(true)}
                            className="bg-[#1a1a1a] border border-white/10 px-3 py-1.5 rounded-xl text-[10px] font-black uppercase tracking-widest text-purple-400 hover:bg-white/5 transition-all flex items-center gap-2"
                        >
                            <IconShare /> SHARE STATUS
                        </button>
                    </header>

                    {/* Diagnosis & Progress Card */}
                    <section className="glass rounded-3xl p-5 mb-4 shadow-2xl relative overflow-hidden">
                        <div className="flex justify-between items-start mb-4">
                            <div className="flex gap-3">
                                <div className="bg-rose-500/10 p-2.5 rounded-xl border border-rose-500/20">
                                    <IconActivity />
                                </div>
                                <div>
                                    <h2 className="text-[10px] font-black text-rose-500 uppercase tracking-[0.2em] mb-0.5">Status Diagnosis</h2>
                                    <p className="text-sm font-bold leading-tight">{diagnosis.title}</p>
                                    <p className="text-[10px] text-emerald-400 font-black uppercase tracking-tighter mt-1 flex items-center gap-1">
                                        <span className="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span> {diagnosis.status}
                                    </p>
                                </div>
                            </div>
                            <div className="text-right">
                                <span className="text-3xl font-black text-purple-500 leading-none">{getProgress()}%</span>
                                <p className="text-[8px] font-black text-gray-600 uppercase tracking-widest">Total</p>
                            </div>
                        </div>
                        <div className="w-full bg-white/5 h-1.5 rounded-full overflow-hidden">
                            <div className="h-full bg-gradient-to-r from-purple-600 to-indigo-600 transition-all duration-1000" style={{ width: `${getProgress()}%` }}></div>
                        </div>
                    </section>

                    {/* Appointment Card */}
                    <section className="bg-gradient-to-br from-indigo-700 to-purple-900 p-5 rounded-3xl border border-white/10 mb-6 shadow-2xl relative group">
                        <div className="flex justify-between items-center">
                            <div className="space-y-1">
                                <p className="text-[9px] font-black text-indigo-200 uppercase tracking-widest opacity-70">Temujanji Seterusnya</p>
                                <p className="text-base font-black tracking-tight">{appointment.date}</p>
                                <div className="flex items-center gap-1 text-indigo-300">
                                    <IconMapPin />
                                    <span className="text-[10px] font-bold">{appointment.location}</span>
                                </div>
                            </div>
                            <div className="text-right">
                                <div className="bg-white/10 px-3 py-1.5 rounded-xl border border-white/10">
                                    <p className="text-[9px] font-black text-white uppercase italic">Minor Oral Surgery</p>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Day Selector */}
                    <div className="flex bg-[#161616] p-1.5 rounded-2xl border border-white/5 mb-6 shadow-inner">
                        {[1, 2, 3, 4, 5].map(day => (
                            <button 
                                key={day} 
                                onClick={() => setActiveDay(day)} 
                                className={`flex-1 py-3 text-xs font-black rounded-xl transition-all duration-300 ${activeDay === day ? 'bg-gradient-to-br from-purple-600 to-indigo-700 text-white shadow-lg scale-95' : 'text-gray-500 hover:text-white'}`}
                            >
                                D{day}
                                <div className="text-[8px] opacity-40 mt-0.5 font-mono">{getDayProgress(day)}/9</div>
                            </button>
                        ))}
                    </div>

                    {/* Schedule Slots */}
                    <div className="space-y-4 mb-8">
                        {timeSlots.map(slot => (
                            <div key={slot.id} className="bg-card rounded-3xl border border-white/5 overflow-hidden shadow-xl">
                                <div className="px-5 py-2.5 bg-white/5 flex justify-between items-center border-b border-white/5">
                                    <span className="text-[10px] font-black uppercase text-gray-500 tracking-widest">{slot.label}</span>
                                    <span className="text-[9px] font-mono text-gray-700 tracking-tighter">{slot.time}</span>
                                </div>
                                <div className="p-3 space-y-2">
                                    {medicationData.map(med => {
                                        const key = `${activeDay}-${med.id}-${slot.id}`;
                                        const isChecked = completedDoses[key];
                                        return (
                                            <button 
                                                key={med.id} 
                                                onClick={() => toggleDose(activeDay, med.id, slot.id)} 
                                                className={`w-full flex items-center justify-between p-4 rounded-2xl border transition-all duration-300 ${isChecked ? 'bg-emerald-500/10 border-emerald-500/30 shadow-inner' : 'bg-slot border-white/5 hover:border-purple-500/30'}`}
                                            >
                                                <div className="flex items-center gap-4 text-left">
                                                    <div className={`p-2.5 rounded-xl transition-all ${isChecked ? 'shiny-green' : med.colorClass}`}>
                                                        <IconPill className={isChecked ? 'text-white' : 'text-white/90'} />
                                                    </div>
                                                    <div>
                                                        <p className={`text-sm font-bold tracking-tight ${isChecked ? 'text-emerald-400 line-through opacity-40' : 'text-white'}`}>{med.name}</p>
                                                        <p className="text-[9px] text-gray-600 font-black uppercase tracking-tighter">{med.dose} • {med.type}</p>
                                                    </div>
                                                </div>
                                                {isChecked ? <IconCheck className="text-emerald-500" /> : <div className="w-5 h-5 rounded-full border border-white/10"></div>}
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Tips & Peringatan - Detailed Section */}
                    <section className="bg-gradient-to-br from-[#1a1a1a] to-[#0f0f0f] rounded-3xl border border-white/10 p-6 shadow-2xl">
                        <div className="flex items-center gap-2 border-b border-white/5 pb-3 mb-4">
                            <div className="w-2 h-2 rounded-full bg-purple-500 animate-pulse"></div>
                            <h3 className="text-[11px] font-black uppercase tracking-[0.2em] text-purple-300">Tips & Peringatan</h3>
                        </div>
                        <div className="space-y-4">
                            {[
                                { id: "01", title: "Antibiotik Wajib Habis", desc: "Amoxicillin & Metronidazole mesti dihabiskan 5 hari penuh untuk keringkan punca sakit." },
                                { id: "02", title: "Alas Perut", desc: "Ubat Diclofenac sangat tajam. Wajib makan Megi atau Nasi sebelum telan ubat tersebut." },
                                { id: "03", title: "Posisi Tidur", desc: "Guna bantal tinggi (posisi menyandar) untuk kurangkan tekanan darah ke saraf gigi." },
                                { id: "04", title: "Pantang Ramadan", desc: "Elakkan rokok daun dan air manis/sejuk buat sementara supaya radang gusi cepat surut." }
                            ].map(tip => (
                                <div key={tip.id} className="flex gap-4">
                                    <span className="text-purple-600 font-black text-xs pt-0.5">{tip.id}</span>
                                    <div>
                                        <p className="text-[11px] font-black text-white uppercase tracking-tight mb-0.5">{tip.title}</p>
                                        <p className="text-[10px] text-gray-500 leading-relaxed font-medium uppercase tracking-tighter">{tip.desc}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>

                    <footer className="mt-12 text-center opacity-30">
                        <p className="text-[8px] font-black uppercase tracking-[0.6em]">Nikolai Tactical Interface • V5.2_FULL_PROCEDURE</p>
                    </footer>

                    {/* High-Res Share Modal */}
                    {showModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/95 backdrop-blur-xl">
                            <div className="bg-[#121212] w-full max-w-sm rounded-[2.5rem] border border-white/10 overflow-hidden shadow-[0_0_80px_rgba(147,51,234,0.3)]">
                                <div className="p-8 text-center space-y-8 bg-gradient-to-b from-[#1a1a1a] to-[#0a0a0a]">
                                    <div className="flex justify-center">
                                        <div className="bg-purple-600 p-3 rounded-2xl shiny-purple">
                                            <IconZap className="text-white" />
                                        </div>
                                    </div>
                                    
                                    <div>
                                        <h3 className="text-2xl font-black italic tracking-tighter uppercase mb-1">Nikolai Medical</h3>
                                        <div className="inline-block px-4 py-1.5 bg-rose-500/10 rounded-full border border-rose-500/20">
                                            <span className="text-[10px] font-black text-rose-500 uppercase tracking-widest">Infection Control Mode</span>
                                        </div>
                                    </div>

                                    <div className="space-y-3 text-left bg-white/5 p-5 rounded-3xl border border-white/5">
                                        <div className="flex justify-between items-center mb-1">
                                            <span className="text-[10px] font-black text-gray-500 uppercase tracking-widest">Treatment Progress</span>
                                            <span className="text-2xl font-black text-purple-500">{getProgress()}%</span>
                                        </div>
                                        <div className="w-full bg-white/10 h-2.5 rounded-full overflow-hidden">
                                            <div className="h-full bg-gradient-to-r from-purple-500 to-indigo-500" style={{ width: `${getProgress()}%` }}></div>
                                        </div>
                                        <p className="text-[10px] font-bold text-gray-400 mt-2 uppercase tracking-tighter leading-tight italic">
                                            Diagnosis: {diagnosis.title}<br/>
                                            Appt: {appointment.date}
                                        </p>
                                    </div>

                                    <div className="grid grid-cols-2 gap-4 text-left">
                                        <div className="bg-indigo-600/10 p-4 rounded-2xl border border-indigo-500/20">
                                            <p className="text-[9px] font-black text-indigo-400 uppercase tracking-widest mb-1">Status</p>
                                            <p className="text-[11px] font-bold italic tracking-tight uppercase leading-none text-indigo-100">Stabilizing</p>
                                        </div>
                                        <div className="bg-emerald-600/10 p-4 rounded-2xl border border-emerald-500/20">
                                            <p className="text-[9px] font-black text-emerald-400 uppercase tracking-widest mb-1">Antibiotics</p>
                                            <p className="text-[11px] font-bold italic tracking-tight uppercase leading-none text-emerald-100">Tracking</p>
                                        </div>
                                    </div>

                                    <p className="text-[9px] text-gray-700 font-black uppercase tracking-[0.4em]">Nikolai Personal System</p>
                                </div>

                                <div className="p-6 bg-[#1a1a1a] border-t border-white/5 space-y-3">
                                    <button 
                                        onClick={copyStatus}
                                        className={`w-full py-4 rounded-2xl font-black text-xs tracking-widest transition-all ${copied ? 'bg-emerald-600 text-white' : 'bg-white text-black hover:bg-gray-200'}`}
                                    >
                                        {copied ? 'BERJAYA DISALIN!' : 'SALIN TEKS STATUS'}
                                    </button>
                                    <button 
                                        onClick={() => setShowModal(false)}
                                        className="w-full py-4 rounded-2xl bg-white/5 text-gray-400 font-black text-xs hover:text-white transition-all uppercase tracking-widest"
                                    >
                                        Tutup
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
