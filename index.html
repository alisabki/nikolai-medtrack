<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nikolai Med-Track | Tactical Interface</title>
    
    <!-- WhatsApp Preview Meta Tags -->
    <meta property="og:title" content="Nikolai Med-Track 🦷⚡">
    <meta property="og:description" content="Tactical Medical Interface - Status Rawatan & Jadual Ubat Nikolai.">
    <meta property="og:type" content="website">

    <!-- CDNs: React, Babel, Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0a0a0a; 
            color: white;
            -webkit-tap-highlight-color: transparent;
        }
        .shiny-purple { 
            box-shadow: 0 0 20px rgba(147, 51, 234, 0.6); 
            background: linear-gradient(135deg, #9333ea 0%, #4f46e5 100%);
        }
        .shiny-green { 
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.5); 
            background: #10b981;
        }
        .glass {
            background: rgba(26, 26, 26, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .bg-card { background-color: #161616; }
        .bg-slot { background-color: #1f1f1f; }
        
        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .animate-pulse-slow { animation: pulse-soft 3s infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Custom SVG Icons for standalone HTML compatibility
        const IconZap = ({ className }) => <svg className={className} width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>;
        const IconShare = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>;
        const IconPill = ({ className }) => <svg className={className} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"></path><path d="m8.5 8.5 7 7"></path></svg>;
        const IconCheck = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>;
        const IconActivity = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>;
        const IconMapPin = () => <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>;
        const IconLock = () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>;
        const IconUnlock = () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg>;

        const App = () => {
            const [activeDay, setActiveDay] = useState(1);
            const [completedDoses, setCompletedDoses] = useState({});
            const [isLocked, setIsLocked] = useState(true);
            const [passInput, setPassInput] = useState('');
            const [error, setError] = useState('');
            const [showModal, setShowModal] = useState(false);
            const [copied, setCopied] = useState(false);

            const ADMIN_PASSWORD = "nikolai123";
            const DOSE_INTERVAL_HOURS = 8;

            const diagnosis = {
                title: "Impacted Wisdom Tooth & Deep Caries",
                description: "Gigi bongsu impak & geraham berlubang dalam (Inflamasi Aktif).",
                status: "Active Infection Control"
            };

            const appointment = {
                date: "29 Mac 2026",
                location: "Klinik Pergigian Kota Bharu",
                procedure: "Minor Oral Surgery (Full Procedure)"
            };

            const medicationData = [
                { id: 'amox', name: 'Amoxicillin', dose: '1 Biji', type: 'Antibiotik', colorClass: 'bg-indigo-600 shadow-[0_0_15px_rgba(79,70,229,0.5)]' },
                { id: 'metro', name: 'Metronidazole', dose: '2 Biji', type: 'Antibiotik', colorClass: 'bg-purple-600 shadow-[0_0_15px_rgba(147,51,234,0.5)]' },
                { id: 'diclo', name: 'Diclofenac', dose: '1 Biji', type: 'Tahan Sakit', colorClass: 'bg-emerald-600 shadow-[0_0_15px_rgba(16,185,129,0.5)]' }
            ];

            const timeSlots = [
                { id: 'sahur', label: 'Sahur', time: '05:00 AM' },
                { id: 'buka', label: 'Iftar', time: '07:20 PM' },
                { id: 'malam', label: 'Malam', time: '11:30 PM' }
            ];

            useEffect(() => {
                const saved = localStorage.getItem('nikolai_v7_logs');
                if (saved) setCompletedDoses(JSON.parse(saved));
            }, []);

            useEffect(() => {
                localStorage.setItem('nikolai_v7_logs', JSON.stringify(completedDoses));
            }, [completedDoses]);

            const handleUnlock = (e) => {
                e.preventDefault();
                if (passInput === ADMIN_PASSWORD) {
                    setIsLocked(false);
                    setError('');
                } else {
                    setError('PIN SALAH, NIKOLAI.');
                    setPassInput('');
                }
            };

            const toggleDose = (day, medId, slotId) => {
                if (isLocked) {
                    setError('Sila Unlock Dahulu!');
                    return;
                }
                const key = `${day}-${medId}-${slotId}`;
                setCompletedDoses(prev => {
                    const newState = { ...prev };
                    if (newState[key]) {
                        delete newState[key];
                    } else {
                        newState[key] = new Date().toISOString();
                    }
                    return newState;
                });
                setError('');
            };

            const formatTime = (isoString) => {
                if (!isoString) return null;
                return new Date(isoString).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
            };

            const getNextDoseTime = (medId) => {
                const timestamps = Object.keys(completedDoses)
                    .filter(key => key.includes(`-${medId}-`))
                    .map(key => new Date(completedDoses[key]).getTime());
                
                if (timestamps.length === 0) return "TBA";
                
                const latest = Math.max(...timestamps);
                const nextDate = new Date(latest + (DOSE_INTERVAL_HOURS * 60 * 60 * 1000));
                return nextDate.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
            };

            const getProgress = () => {
                const total = 5 * 3 * 3;
                const done = Object.values(completedDoses).filter(Boolean).length;
                return Math.round((done / total) * 100);
            };

            const getDayProgress = (day) => {
                const dayKeys = Object.keys(completedDoses).filter(k => k.startsWith(`${day}-`));
                return dayKeys.filter(k => completedDoses[k]).length;
            };

            const copyStatus = () => {
                const text = `Update Medis Nikolai:\n🦷 Diagnosis: ${diagnosis.title}\n📅 Temujanji: ${appointment.date}\n📊 Progress: ${getProgress()}%\n#NikolaiTacticalHealth`;
                navigator.clipboard.writeText(text);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-xl mx-auto pb-24 font-sans">
                    
                    <header className="flex justify-between items-center mb-6">
                        <div className="flex items-center gap-2">
                            <div className="bg-purple-600 p-2 rounded-xl shiny-purple">
                                <IconZap className="text-white fill-white" />
                            </div>
                            <h1 className="text-xl font-black italic tracking-tighter uppercase tracking-widest bg-gradient-to-r from-white to-gray-400 bg-clip-text text-transparent">
                                Nikolai Hub
                            </h1>
                        </div>
                        
                        <div className="flex items-center gap-2">
                            {isLocked ? (
                                <form onSubmit={handleUnlock} className="flex items-center gap-2 bg-[#161616] p-1 rounded-xl border border-white/5">
                                    <input 
                                        type="password" 
                                        placeholder="PIN" 
                                        className="bg-transparent text-[10px] w-12 px-2 focus:outline-none font-bold"
                                        value={passInput}
                                        onChange={(e) => setPassInput(e.target.value)}
                                    />
                                    <button type="submit" className="bg-purple-600 p-1.5 rounded-lg">
                                        <IconLock />
                                    </button>
                                </form>
                            ) : (
                                <button onClick={() => setIsLocked(true)} className="bg-emerald-600 px-3 py-1.5 rounded-xl text-[10px] font-black flex items-center gap-2 shadow-[0_0_15px_rgba(16,185,129,0.4)] tracking-widest uppercase">
                                    <IconUnlock /> Unlocked
                                </button>
                            )}
                        </div>
                    </header>

                    {error && (
                        <div className="bg-rose-600/20 border border-rose-500/50 p-2.5 rounded-2xl text-[10px] font-bold text-rose-500 mb-4 flex items-center gap-2 animate-pulse uppercase">
                            ⚠️ {error}
                        </div>
                    )}

                    <section className="bg-[#161616] rounded-[2rem] p-6 mb-4 border border-white/5 shadow-2xl overflow-hidden relative group">
                        <div className="flex justify-between items-start mb-4 text-left">
                            <div className="flex gap-4">
                                <div className="bg-rose-500/10 p-3 rounded-2xl border border-rose-500/20 text-rose-500">
                                    <IconActivity />
                                </div>
                                <div>
                                    <h2 className="text-[10px] font-black text-rose-500 uppercase tracking-[0.2em] mb-1">Tactical Analysis</h2>
                                    <p className="text-sm font-bold leading-tight">{diagnosis.title}</p>
                                    <p className="text-[10px] text-emerald-400 font-bold uppercase mt-1.5 tracking-tighter flex items-center gap-1 italic">
                                       <span className="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span> {diagnosis.status}
                                    </p>
                                </div>
                            </div>
                            <div className="text-right">
                                <span className="text-4xl font-black text-purple-600 leading-none">{getProgress()}%</span>
                                <p className="text-[8px] font-black text-gray-600 uppercase mt-1 tracking-widest">Recovery</p>
                            </div>
                        </div>
                        <div className="w-full bg-white/5 h-2 rounded-full overflow-hidden">
                            <div className="h-full bg-gradient-to-r from-purple-600 to-indigo-600 transition-all duration-1000" style={{ width: `${getProgress()}%` }}></div>
                        </div>
                    </section>

                    <section className="bg-gradient-to-br from-indigo-800 to-purple-900 p-5 rounded-[2rem] border border-white/10 mb-6 shadow-2xl flex justify-between items-center text-left relative overflow-hidden">
                        <div className="relative z-10">
                            <p className="text-[9px] font-black text-indigo-200 uppercase tracking-widest opacity-60 italic mb-1">Temujanji Seterusnya</p>
                            <p className="text-sm font-black tracking-tight">{appointment.date}</p>
                            <div className="flex items-center gap-1 text-indigo-300 mt-1">
                                <IconMapPin />
                                <span className="text-[9px] font-bold tracking-tighter uppercase">{appointment.location}</span>
                            </div>
                        </div>
                        <div className="bg-white/10 px-4 py-2 rounded-2xl border border-white/10 text-[9px] font-black italic uppercase">
                            Minor Oral Surgery
                        </div>
                    </section>

                    <div className="flex bg-[#161616] p-1.5 rounded-2xl border border-white/5 mb-6 shadow-inner">
                        {[1, 2, 3, 4, 5].map(day => (
                            <button 
                                key={day} 
                                onClick={() => setActiveDay(day)} 
                                className={`flex-1 py-3 text-xs font-black rounded-xl transition-all duration-300 ${activeDay === day ? 'bg-gradient-to-br from-purple-600 to-indigo-700 text-white shadow-lg' : 'text-gray-500'}`}
                            >
                                D{day}
                                <div className="text-[8px] opacity-40 font-mono tracking-tighter mt-0.5 uppercase">{getDayProgress(day)}/9</div>
                            </button>
                        ))}
                    </div>

                    <div className="space-y-4 mb-8">
                        {timeSlots.map(slot => (
                            <div key={slot.id} className="bg-[#161616] rounded-[2rem] border border-white/5 overflow-hidden shadow-2xl">
                                <div className="px-6 py-3 bg-white/5 flex justify-between items-center border-b border-white/5">
                                    <div className="flex items-center gap-2">
                                        <span className="text-[11px] font-black uppercase text-gray-500 tracking-widest">{slot.label}</span>
                                    </div>
                                    <span className="text-[9px] font-mono text-gray-700 italic uppercase tracking-tighter">Planned: {slot.time}</span>
                                </div>
                                <div className="p-3 space-y-2.5">
                                    {medicationData.map(med => {
                                        const key = `${activeDay}-${med.id}-${slot.id}`;
                                        const timeTaken = completedDoses[key];
                                        const isChecked = !!timeTaken;
                                        const nextDoseSuggestion = getNextDoseTime(med.id);

                                        return (
                                            <button 
                                                key={med.id} 
                                                onClick={() => toggleDose(activeDay, med.id, slot.id)} 
                                                className={`w-full flex items-center justify-between p-4 rounded-2xl border transition-all duration-300 group ${isChecked ? 'bg-emerald-500/5 border-emerald-500/20' : 'bg-[#1f1f1f] border-white/5 hover:border-purple-500/30'}`}
                                            >
                                                <div className="flex items-center gap-4 text-left">
                                                    <div className={`p-3 rounded-xl transition-all ${isChecked ? 'bg-emerald-600' : med.colorClass}`}>
                                                        <IconPill className="text-white" />
                                                    </div>
                                                    <div>
                                                        <p className={`text-sm font-bold tracking-tight ${isChecked ? 'text-emerald-400 line-through opacity-40' : 'text-white'}`}>{med.name}</p>
                                                        <div className="flex flex-col gap-0.5">
                                                            <p className="text-[9px] text-gray-600 font-black uppercase tracking-tighter">{med.dose} • {med.type}</p>
                                                            {isChecked && <span className="text-[8px] text-emerald-400 font-mono italic font-bold">Diambil Pada: {formatTime(timeTaken)}</span>}
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="text-right">
                                                    {isChecked ? (
                                                        <IconCheck className="text-emerald-500" />
                                                    ) : (
                                                        <div className="flex flex-col items-end">
                                                            <div className="w-5 h-5 rounded-full border border-white/10 mb-1"></div>
                                                            <span className="text-[9px] font-black text-gray-700 uppercase tracking-tighter italic leading-none">Cadangan Seterusnya:</span>
                                                            <span className="text-[10px] font-black text-purple-400 mt-0.5 font-mono">{nextDoseSuggestion}</span>
                                                        </div>
                                                    )}
                                                </div>
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                        ))}
                    </div>

                    <div className="grid grid-cols-1 gap-4 mb-12">
                        <button 
                            onClick={() => setShowModal(true)}
                            className="w-full py-4 bg-gradient-to-r from-purple-700 to-indigo-800 rounded-2xl font-black text-xs uppercase tracking-[0.2em] shadow-lg flex items-center justify-center gap-3"
                        >
                            <IconShare /> Share Status Medis
                        </button>
                    </div>

                    {showModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/95 backdrop-blur-xl">
                            <div className="bg-[#121212] w-full max-w-sm rounded-[2.5rem] border border-white/10 overflow-hidden shadow-2xl">
                                <div className="p-8 text-center space-y-8 bg-gradient-to-b from-[#1a1a1a] to-[#0a0a0a]">
                                    <div className="flex justify-center">
                                        <div className="bg-purple-600 p-3 rounded-2xl shiny-purple">
                                            <IconZap className="text-white fill-white" />
                                        </div>
                                    </div>
                                    <h3 className="text-2xl font-black italic tracking-tighter uppercase mb-1 leading-none">Nikolai Medical</h3>
                                    <div className="space-y-3 text-left bg-white/5 p-5 rounded-3xl border border-white/5">
                                        <div className="flex justify-between items-center mb-1">
                                            <span className="text-[10px] font-black text-gray-500 uppercase tracking-widest">Progress</span>
                                            <span className="text-2xl font-black text-purple-500">{getProgress()}%</span>
                                        </div>
                                        <div className="w-full bg-white/10 h-2 rounded-full overflow-hidden">
                                            <div className="h-full bg-purple-500" style={{ width: `${getProgress()}%` }}></div>
                                        </div>
                                        <p className="text-[10px] font-bold text-gray-400 mt-2 uppercase tracking-tighter italic leading-tight">
                                            Diagnosis: {diagnosis.title}<br/>
                                            Appt: {appointment.date}
                                        </p>
                                    </div>
                                    <div className="p-6 bg-[#1a1a1a] border-t border-white/5 space-y-3 rounded-3xl">
                                        <button onClick={copyStatus} className={`w-full py-4 rounded-2xl font-black text-xs tracking-widest transition-all ${copied ? 'bg-emerald-600 text-white' : 'bg-white text-black'}`}>
                                            {copied ? 'TEKS DISALIN!' : 'SALIN TEKS STATUS'}
                                        </button>
                                        <button onClick={() => setShowModal(false)} className="w-full py-4 rounded-2xl bg-white/5 text-gray-400 font-black text-xs uppercase tracking-widest transition-all hover:text-white uppercase">Tutup</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="mt-12 text-center opacity-30 pb-10">
                        <p className="text-[8px] font-black uppercase tracking-[0.6em]">Nikolai Tactical V7.0_STABLE</p>
                    </footer>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
