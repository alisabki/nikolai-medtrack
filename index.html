<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nikolai Med-Track | Tactical Interface</title>
    
    <!-- Meta Tags for Social Preview -->
    <meta property="og:title" content="Nikolai Med-Track 🦷⚡">
    <meta property="og:description" content="Tactical Medical Interface - Status Rawatan & Jadual Ubat Nikolai.">
    <meta property="og:type" content="website">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0a0a0a; 
            color: white;
            -webkit-tap-highlight-color: transparent;
        }
        .shiny-purple { 
            box-shadow: 0 0 15px rgba(147, 51, 234, 0.5); 
            background: linear-gradient(135deg, #9333ea 0%, #4f46e5 100%);
        }
        .shiny-green { 
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); 
            background: #10b981;
        }
        .glass {
            background: rgba(26, 26, 26, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .bg-dark-grey { background-color: #161616; }
        .bg-deeper-grey { background-color: #0f0f0f; }
        
        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse-slow { animation: pulse-soft 3s infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Icons as simple SVG components for reliability
        const IconZap = ({ className }) => <svg className={className} width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>;
        const IconShare = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>;
        const IconPill = ({ className }) => <svg className={className} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"></path><path d="m8.5 8.5 7 7"></path></svg>;
        const IconCheck = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>;

        const App = () => {
            const [activeDay, setActiveDay] = useState(1);
            const [completedDoses, setCompletedDoses] = useState({});
            const [showModal, setShowModal] = useState(false);
            const [copied, setCopied] = useState(false);

            const diagnosis = {
                title: "Impacted Wisdom Tooth & Deep Caries",
                description: "Gigi bongsu menolak geraham (impak) + Gigi geraham berlubang dalam.",
                status: "Active Infection"
            };

            const appointment = {
                date: "29 Mac 2026",
                location: "Klinik Pergigian Kota Bharu",
                procedure: "Cabutan Gigi / MOS"
            };

            const medicationData = [
                { id: 'amox', name: 'Amoxicillin', dose: '1 Biji', type: 'Antibiotik', color: 'purple' },
                { id: 'metro', name: 'Metronidazole', dose: '2 Biji', type: 'Antibiotik', color: 'purple' },
                { id: 'diclo', name: 'Diclofenac', dose: '1 Biji', type: 'Tahan Sakit', color: 'green' }
            ];

            const timeSlots = [
                { id: 'sahur', label: 'Sahur', time: '05:00 AM' },
                { id: 'buka', label: 'Iftar', time: '07:20 PM' },
                { id: 'malam', label: 'Malam', time: '11:30 PM' }
            ];

            useEffect(() => {
                const saved = localStorage.getItem('nikolai_meds_final');
                if (saved) setCompletedDoses(JSON.parse(saved));
            }, []);

            useEffect(() => {
                localStorage.setItem('nikolai_meds_final', JSON.stringify(completedDoses));
            }, [completedDoses]);

            const toggleDose = (day, medId, slotId) => {
                const key = `${day}-${medId}-${slotId}`;
                setCompletedDoses(prev => ({ ...prev, [key]: !prev[key] }));
            };

            const getProgress = () => {
                const total = 5 * 3 * 3;
                const done = Object.values(completedDoses).filter(Boolean).length;
                return Math.round((done / total) * 100);
            };

            const getDayProgress = (day) => {
                const dayKeys = Object.keys(completedDoses).filter(k => k.startsWith(`${day}-`));
                return dayKeys.filter(k => completedDoses[k]).length;
            };

            const copyToClipboard = () => {
                const text = `Nikolai Med-Track Update:\n🦷 Diagnosis: ${diagnosis.title}\n📅 Next Appt: ${appointment.date}\n💊 Progress: ${getProgress()}%\n#NikolaiTacticalHealth`;
                navigator.clipboard.writeText(text);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-xl mx-auto pb-20">
                    {/* Header */}
                    <header className="flex items-center justify-between mb-6">
                        <div className="flex items-center gap-2">
                            <div className="bg-purple-600 p-2 rounded-lg shiny-purple">
                                <IconZap className="text-white" />
                            </div>
                            <h1 className="text-xl font-black uppercase italic tracking-tighter">Nikolai Hub</h1>
                        </div>
                        <button 
                            onClick={() => setShowModal(true)}
                            className="bg-[#1a1a1a] border border-white/10 px-3 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-widest text-purple-400 hover:bg-white/5 transition-all flex items-center gap-2"
                        >
                            <IconShare /> SHARE STATUS
                        </button>
                    </header>

                    {/* Diagnosis & Appt */}
                    <div className="grid grid-cols-1 gap-3 mb-6">
                        <section className="glass rounded-2xl p-4 shadow-xl">
                            <div className="flex justify-between items-start mb-2">
                                <div>
                                    <h2 className="text-[9px] font-black text-rose-500 uppercase tracking-[0.2em] mb-1">Status Rawatan</h2>
                                    <p className="text-sm font-bold leading-tight">{diagnosis.title}</p>
                                    <p className="text-[10px] text-gray-500 mt-1 uppercase font-bold tracking-tighter italic">{diagnosis.status}</p>
                                </div>
                                <div className="text-right">
                                    <span className="text-2xl font-black text-purple-500 leading-none">{getProgress()}%</span>
                                    <p className="text-[8px] font-black text-gray-600 uppercase">Progress</p>
                                </div>
                            </div>
                            <div className="w-full bg-white/5 h-1 rounded-full overflow-hidden mt-2">
                                <div className="h-full bg-purple-600" style={{ width: `${getProgress()}%` }}></div>
                            </div>
                        </section>

                        <section className="bg-gradient-to-br from-indigo-700 to-purple-900 p-4 rounded-2xl border border-white/10 shadow-2xl relative overflow-hidden">
                            <div className="relative z-10 flex justify-between items-center">
                                <div>
                                    <p className="text-[9px] font-black text-indigo-200 uppercase tracking-widest mb-1">Temujanji Seterusnya</p>
                                    <p className="text-sm font-black">{appointment.date}</p>
                                    <p className="text-[10px] font-bold text-indigo-300/70">{appointment.location}</p>
                                </div>
                                <div className="bg-white/10 p-2 rounded-lg border border-white/10">
                                    <p className="text-[8px] font-black text-white uppercase tracking-tighter">MOS PROSEDUR</p>
                                </div>
                            </div>
                        </section>
                    </div>

                    {/* Day Navigator */}
                    <div className="flex bg-[#161616] p-1 rounded-xl border border-white/5 mb-6 overflow-x-auto">
                        {[1, 2, 3, 4, 5].map(day => (
                            <button 
                                key={day} 
                                onClick={() => setActiveDay(day)} 
                                className={`flex-1 min-w-[60px] py-3 text-xs font-black rounded-lg transition-all ${activeDay === day ? 'bg-purple-600 text-white shadow-lg' : 'text-gray-500 hover:text-white'}`}
                            >
                                DAY {day}
                                <div className="text-[8px] opacity-40">{getDayProgress(day)}/9</div>
                            </button>
                        ))}
                    </div>

                    {/* Schedule */}
                    <div className="space-y-4 mb-10">
                        {timeSlots.map(slot => (
                            <div key={slot.id} className="bg-dark-grey rounded-2xl border border-white/5 overflow-hidden shadow-2xl">
                                <div className="px-4 py-2 bg-white/5 flex justify-between items-center border-b border-white/5">
                                    <span className="text-[10px] font-black uppercase text-gray-500 tracking-widest">{slot.label}</span>
                                    <span className="text-[9px] font-mono text-gray-700">{slot.time}</span>
                                </div>
                                <div className="p-2 space-y-2">
                                    {medicationData.map(med => {
                                        const key = `${activeDay}-${med.id}-${slot.id}`;
                                        const isChecked = completedDoses[key];
                                        return (
                                            <button 
                                                key={med.id} 
                                                onClick={() => toggleDose(activeDay, med.id, slot.id)} 
                                                className={`w-full flex items-center justify-between p-3 rounded-xl border transition-all duration-300 ${isChecked ? 'bg-emerald-500/10 border-emerald-500/30' : 'bg-deeper-grey border-white/5 hover:border-purple-500/40'}`}
                                            >
                                                <div className="flex items-center gap-3 text-left">
                                                    <div className={`p-2 rounded-lg transition-all ${isChecked ? 'shiny-green' : 'bg-[#0a0a0a] border border-white/5'}`}>
                                                        <IconPill className={isChecked ? 'text-white' : 'text-gray-700'} />
                                                    </div>
                                                    <div>
                                                        <p className={`text-xs font-bold ${isChecked ? 'text-emerald-400 line-through opacity-40' : 'text-white'}`}>{med.name}</p>
                                                        <p className="text-[8px] text-gray-600 font-bold uppercase tracking-tighter">{med.dose} • {med.type}</p>
                                                    </div>
                                                </div>
                                                {isChecked ? <IconCheck className="text-emerald-500" /> : <div className="w-4 h-4 rounded-full border border-white/10"></div>}
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Peringatan Section - Added back as Nikolai requested */}
                    <section className="bg-gradient-to-br from-[#1a1a1a] to-[#111] rounded-2xl border border-white/10 p-5 shadow-2xl space-y-4">
                        <div className="flex items-center gap-2 border-b border-white/5 pb-2">
                            <div className="w-1.5 h-1.5 rounded-full bg-purple-500 animate-pulse"></div>
                            <h3 className="text-xs font-black uppercase tracking-widest text-purple-300">Tips & Peringatan</h3>
                        </div>
                        <ul className="space-y-3">
                            <li className="flex gap-3">
                                <span className="text-purple-500 font-black text-xs">01</span>
                                <p className="text-[10px] text-gray-400 leading-relaxed font-bold uppercase tracking-tight">
                                    <span className="text-white">Antibiotik Wajib Habis:</span> Amoxicillin & Metronidazole mesti dihabiskan 5 hari penuh untuk elak kuman jadi lali.
                                </p>
                            </li>
                            <li className="flex gap-3">
                                <span className="text-purple-500 font-black text-xs">02</span>
                                <p className="text-[10px] text-gray-400 leading-relaxed font-bold uppercase tracking-tight">
                                    <span className="text-white">Diclofenac:</span> Ubat ni sangat tajam. Wajib alas perut (Megi/Nasi) sebelum telan untuk elak pedih ulu hati.
                                </p>
                            </li>
                            <li className="flex gap-3">
                                <span className="text-purple-500 font-black text-xs">03</span>
                                <p className="text-[10px] text-gray-400 leading-relaxed font-bold uppercase tracking-tight">
                                    <span className="text-white">Posisi Tidur:</span> Guna bantal tinggi (menyandar) untuk kurangkan denyutan saraf gigi.
                                </p>
                            </li>
                            <li className="flex gap-3">
                                <span className="text-purple-500 font-black text-xs">04</span>
                                <p className="text-[10px] text-gray-400 leading-relaxed font-bold uppercase tracking-tight">
                                    <span className="text-white">Pantang:</span> Elakkan rokok daun dan air manis/sejuk buat sementara supaya radang cepat surut.
                                </p>
                            </li>
                        </ul>
                    </section>

                    <footer className="mt-10 text-center opacity-20 text-[8px] font-black tracking-[0.5em] uppercase">
                        Nikolai Tactical Interface • V4.FULL
                    </footer>

                    {/* Share Modal - Added back as Nikolai requested */}
                    {showModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/90 backdrop-blur-md">
                            <div className="bg-[#121212] w-full max-w-xs rounded-3xl border border-white/10 overflow-hidden shadow-2xl">
                                <div className="p-6 text-center space-y-4">
                                    <div className="flex justify-center">
                                        <div className="bg-purple-600 p-2 rounded-xl shiny-purple">
                                            <IconZap className="text-white" />
                                        </div>
                                    </div>
                                    <h3 className="text-xl font-black italic tracking-tighter uppercase">Nikolai Med-Track</h3>
                                    <div className="bg-white/5 p-4 rounded-xl border border-white/5 text-left">
                                        <p className="text-[8px] font-black text-gray-500 uppercase mb-1">Treatment Progress</p>
                                        <p className="text-lg font-black text-purple-500">{getProgress()}% Completed</p>
                                        <p className="text-[10px] font-bold text-gray-400 mt-2 uppercase italic leading-tight">
                                            Diagnosis: {diagnosis.title}<br/>
                                            Next: {appointment.date}
                                        </p>
                                    </div>
                                    <div className="space-y-2">
                                        <button 
                                            onClick={copyToClipboard}
                                            className={`w-full py-3 rounded-xl font-black text-xs transition-all ${copied ? 'bg-emerald-600 text-white' : 'bg-white text-black hover:bg-gray-200'}`}
                                        >
                                            {copied ? 'TEKS TERSALIN!' : 'SALIN TEKS STATUS'}
                                        </button>
                                        <button 
                                            onClick={() => setShowModal(false)}
                                            className="w-full py-3 rounded-xl bg-red-600/20 text-red-500 font-black text-xs hover:bg-red-600/30"
                                        >
                                            TUTUP
                                        </button>
                                    </div>
                                    <p className="text-[8px] text-gray-700 font-black uppercase tracking-widest">Screenshot kad di atas</p>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
