<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nikolai Med-Track | Tactical Interface</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: white; }
        .shiny-purple { box-shadow: 0 0 20px rgba(147, 51, 234, 0.4); }
        .shiny-green { box-shadow: 0 0 20px rgba(16, 185, 129, 0.3); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // Inline SVG Icons to replace Lucide-React for single HTML file compatibility
        const IconZap = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>;
        const IconClock = () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
        const IconCalendar = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>;
        const IconPill = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"></path><path d="m8.5 8.5 7 7"></path></svg>;

        const App = () => {
            const [activeDay, setActiveDay] = useState(1);
            const [completedDoses, setCompletedDoses] = useState({});

            const diagnosis = {
                title: "Impacted Wisdom Tooth & Deep Caries",
                description: "Gigi bongsu menolak geraham (impak) + Gigi geraham berlubang dalam.",
                status: "Active Infection"
            };

            const appointment = {
                date: "29 Mac 2026",
                location: "Klinik Pergigian Kota Bharu",
                procedure: "Cabutan Gigi / MOS"
            };

            const medicationData = [
                { id: 'amoxicillin', name: 'Amoxicillin', dose: '1 Biji', type: 'Antibiotik' },
                { id: 'metronidazole', name: 'Metronidazole', dose: '2 Biji', type: 'Antibiotik' },
                { id: 'diclofenac', name: 'Diclofenac', dose: '1 Biji', type: 'Tahan Sakit' }
            ];

            const timeSlots = [
                { id: 'sahur', label: 'Sahur', time: '05:00 AM' },
                { id: 'buka', label: 'Iftar', time: '07:20 PM' },
                { id: 'malam', label: 'Malam', time: '11:30 PM' }
            ];

            useEffect(() => {
                const saved = localStorage.getItem('nikolai_gh_meds');
                if (saved) setCompletedDoses(JSON.parse(saved));
            }, []);

            useEffect(() => {
                localStorage.setItem('nikolai_gh_meds', JSON.stringify(completedDoses));
            }, [completedDoses]);

            const toggleDose = (day, medId, slotId) => {
                const key = `${day}-${medId}-${slotId}`;
                setCompletedDoses(prev => ({ ...prev, [key]: !prev[key] }));
            };

            const getProgress = () => {
                const total = 5 * 3 * 3;
                const done = Object.values(completedDoses).filter(Boolean).length;
                return Math.round((done / total) * 100);
            };

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-xl mx-auto">
                    <header className="flex items-center justify-between mb-6">
                        <div className="flex items-center gap-2">
                            <div className="bg-purple-600 p-2 rounded-lg shiny-purple">
                                <IconZap />
                            </div>
                            <h1 className="text-xl font-black uppercase italic tracking-tighter">Nikolai Hub</h1>
                        </div>
                        <div className="text-[10px] font-mono text-gray-600">STATIC_BUILD_V4</div>
                    </header>

                    <section className="bg-[#161616] border border-white/5 rounded-2xl p-4 mb-4 shadow-xl">
                        <div className="flex justify-between items-center mb-4">
                            <div>
                                <h2 className="text-[10px] font-black text-rose-500 uppercase tracking-widest">Diagnosis</h2>
                                <p className="text-sm font-bold">{diagnosis.title}</p>
                            </div>
                            <div className="text-right">
                                <span className="text-2xl font-black text-purple-500">{getProgress()}%</span>
                            </div>
                        </div>
                        <div className="w-full bg-white/5 h-1.5 rounded-full overflow-hidden">
                            <div className="h-full bg-purple-600" style={{ width: `${getProgress()}%` }}></div>
                        </div>
                    </section>

                    <section className="bg-gradient-to-br from-indigo-700 to-purple-900 p-4 rounded-2xl border border-white/10 mb-6 shadow-2xl">
                        <div className="flex items-center gap-3">
                            <IconCalendar />
                            <div>
                                <p className="text-[9px] font-bold text-indigo-200 uppercase tracking-widest">Next Appointment</p>
                                <p className="text-sm font-black">{appointment.date} @ {appointment.location}</p>
                            </div>
                        </div>
                    </section>

                    <div className="flex bg-[#161616] p-1 rounded-xl border border-white/5 mb-6">
                        {[1, 2, 3, 4, 5].map(day => (
                            <button key={day} onClick={() => setActiveDay(day)} className={`flex-1 py-3 text-xs font-black rounded-lg transition-all ${activeDay === day ? 'bg-purple-600 text-white' : 'text-gray-500'}`}>
                                D{day}
                            </button>
                        ))}
                    </div>

                    <div className="space-y-4">
                        {timeSlots.map(slot => (
                            <div key={slot.id} className="bg-[#161616] rounded-2xl border border-white/5 overflow-hidden">
                                <div className="px-4 py-2 bg-white/5 flex justify-between items-center border-b border-white/5">
                                    <span className="text-[10px] font-black uppercase text-gray-500">{slot.label}</span>
                                    <span className="text-[9px] font-mono text-gray-700">{slot.time}</span>
                                </div>
                                <div className="p-2 space-y-2">
                                    {medicationData.map(med => {
                                        const key = `${activeDay}-${med.id}-${slot.id}`;
                                        const isChecked = completedDoses[key];
                                        return (
                                            <button key={med.id} onClick={() => toggleDose(activeDay, med.id, slot.id)} className={`w-full flex items-center justify-between p-3 rounded-xl border transition-all ${isChecked ? 'bg-emerald-500/10 border-emerald-500/30' : 'bg-[#1f1f1f] border-white/5'}`}>
                                                <div className="flex items-center gap-3 text-left">
                                                    <div className={`p-2 rounded-lg ${isChecked ? 'bg-emerald-600' : 'bg-[#0a0a0a]'}`}>
                                                        <IconPill />
                                                    </div>
                                                    <div>
                                                        <p className={`text-xs font-bold ${isChecked ? 'text-emerald-400 line-through opacity-40' : 'text-white'}`}>{med.name}</p>
                                                        <p className="text-[8px] text-gray-600 font-bold uppercase">{med.dose}</p>
                                                    </div>
                                                </div>
                                                {isChecked && <div className="w-2 h-2 rounded-full bg-emerald-500"></div>}
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                        ))}
                    </div>

                    <footer className="mt-10 text-center opacity-20 text-[8px] font-black tracking-[0.5em] uppercase">
                        Nikolai Tactical Interface
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
